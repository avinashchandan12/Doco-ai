version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd $CODEBUILD_SRC_DIR/frontend && yarn install --frozen-lockfile
    build:
      commands:
        - cd $CODEBUILD_SRC_DIR/frontend && yarn build
  artifacts:
    baseDirectory: frontend/build
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
